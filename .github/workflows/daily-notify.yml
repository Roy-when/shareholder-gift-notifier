name: 每日股東紀念品更新

on:
  schedule:
    - cron: "0 0 * * *"   # 台灣時間 08:00（UTC 00:00）
  workflow_dispatch:        # 保留手動觸發

permissions:
  contents: write           # 允許推回 data.json

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install requests beautifulsoup4 pandas python-dotenv

      - name: 執行爬蟲，輸出 data.json
        run: python temp.py

      - name: 推回 data.json 到 repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update data.json $(date +'%Y-%m-%d')"
          git push
