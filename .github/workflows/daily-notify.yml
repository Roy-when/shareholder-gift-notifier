name: Daily Shareholder Gift Notifier

on:
  schedule:
    - cron: '0 1 * * *'           # UTC 01:00 = 台灣時間 09:00
  workflow_dispatch:              # 允許手動測試

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6          # ← 已更新至 v6（支援 Node.js 24）

      - name: Set up Python
        uses: actions/setup-python@v6      # ← 已更新至 v6（支援 Node.js 24）
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas python-dotenv openpyxl

      - name: Run notification script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
        run: python shareholder_gift_notifier.py

      - name: Upload generated Excel (for debugging)
        if: always()
        uses: actions/upload-artifact@v6   # ← 已更新至 v6（支援 Node.js 24）
        with:
          name: daily-gift-list
          path: 股東紀念品_*.xlsx
          retention-days: 7
