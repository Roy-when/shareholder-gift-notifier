name: Daily Shareholder Gift Notifier

on:
  schedule:
    - cron: '0 1 * * *'           # UTC 01:00 = 台灣時間 09:00 (CST/UTC+8)
  workflow_dispatch:              # 允許手動觸發測試（非常實用）

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'     # 或 '3.11' / '3.10'，依您的相容性選擇

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas python-dotenv openpyxl

      - name: Run notification script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
          # USER_ID: ${{ secrets.USER_ID }}   # 若需要可取消註解
        run: python shareholder_gift_notifier.py

      - name: Upload generated Excel (for debugging)
        if: always()                     # 無論成功失敗都上傳
        uses: actions/upload-artifact@v4
        with:
          name: daily-gift-list
          path: 股東紀念品_*.xlsx
          retention-days: 7              # 保留 7 天
