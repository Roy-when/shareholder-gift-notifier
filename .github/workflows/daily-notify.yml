name: 每日股東紀念品同步到 Notion

on:
  schedule:
    # 每天台灣時間 08:00 執行（UTC+8，所以 UTC 是 00:00）
    - cron: "0 0 * * *"
  workflow_dispatch:  # 保留手動觸發按鈕，方便測試

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: |
          pip install requests beautifulsoup4 pandas "notion-client==2.2.1" python-dotenv openpyxl

      - name: 執行同步腳本
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python temp.py
